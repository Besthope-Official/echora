<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta
	http-equiv="Content-Security-Policy"
	content="default-src 'none'; img-src {{cspSource}} https: data:; style-src {{cspSource}}; script-src {{cspSource}}; font-src {{cspSource}};"
/>
<link rel="stylesheet" href="{{styleUri}}" />
<title>Echora Chat</title>
</head>
<body>
	<div id="layout">
		<div id="messages"></div>
		<div id="bottom-panel">
			<div id="state-indicator"></div>
			<div id="draft-wrap">
				<div id="draft-label">Transcription ready. Edit and send.</div>
				<textarea id="draft-input" placeholder="Review transcription before sending"></textarea>
				<div id="draft-actions">
					<button id="send-btn" type="button">Send</button>
				</div>
			</div>
		</div>
	</div>
	<script src="{{scriptUri}}"></script>
</body>
</html>
